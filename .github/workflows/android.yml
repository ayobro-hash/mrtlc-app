name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Project Dependencies
      run: npm install

    - name: Run Android Production Build
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Absolute Force Icon Overwrite
      run: |
        # Define all density folders inside the native Android layer
        DENSITIES=("mdpi" "hdpi" "xhdpi" "xxhdpi" "xxxhdpi")
        
        # Loop through and forcefully copy your icon into EVERY single legacy and adaptive slot
        for density in "${DENSITIES[@]}"; do
          TARGET_DIR="android/app/src/main/res/mipmap-$density"
          mkdir -p "$TARGET_DIR"
          
          # Legacy square and round icons
          cp assets/icon-only.png "$TARGET_DIR/ic_launcher.png"
          cp assets/icon-only.png "$TARGET_DIR/ic_launcher_round.png"
          
          # Modern Android Adaptive foreground layers
          cp assets/icon-only.png "$TARGET_DIR/ic_launcher_foreground.png"
        done

    - name: Compile Native Android Application
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mrtlc-nexus-core
        path: android/app/build/outputs/apk/debug/app-debug.apk
