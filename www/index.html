<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRTLC // CORE V3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ide-container">
        
        <nav class="activity-bar">
            <div class="icon active" title="Explorer">📁</div>
            <div class="icon" title="Cloud Vault">☁️</div>
            <div class="icon" title="Settings">⚙️</div>
        </nav>

        <main class="editor-area">
            <div class="tab-bar">
                <div class="tab active">
                    <input type="text" id="filename-input" value="main_script.lua">
                    <span class="close-tab">×</span>
                </div>
                <div class="action-buttons">
                    <button id="sync-btn" class="btn btn-glow">
                        <span class="cloud-icon">☁️</span> SYNC UPLINK
                    </button>
                </div>
            </div>

            <div class="code-container">
                <div class="line-numbers" id="line-numbers">1</div>
                <textarea id="editor" spellcheck="false" placeholder="-- Initialize core sequence..."></textarea>
            </div>
        </main>

        <section class="terminal-drawer">
            <div class="terminal-header">
                <span>TERMINAL // OUTPUT</span>
                <div class="terminal-actions">
                    <button id="clear-term" class="icon-btn">🗑️</button>
                </div>
            </div>
            <div id="console-output" class="terminal-body">
                <div class="log system">MRTLC Core v3.0 initialized.</div>
                <div class="log system">Standing by for local input...</div>
            </div>
        </section>

        <footer class="status-bar">
            <div class="status-left">
                <span id="status-indicator" class="dot offline"></span>
                <span id="status-text">Disconnected</span>
            </div>
            <div class="status-right">
                <span>UTF-8</span>
                <span>Lua/MRTLC</span>
                <span>Termux::Node</span>
            </div>
        </footer>
    </div>

    <script type="module" src="app-ui.js"></script>
</body>
</html>
