<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRTLC Nexus | High-Precision Decompiler</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-green: #7ee787;
            --accent-blue: #58a6ff;
            --text-main: #c9d1d9;
            --border: #30363d;
            --prop-orange: #f2a154;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .header { border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .panel { background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        .controls { display: flex; align-items: center; justify-content: space-between; background: #010409; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #parse-btn { background: var(--accent-blue); color: white; }
        #copy-btn { background: var(--accent-green); color: #000; }
        button:active { transform: scale(0.98); }

        /* Studio Workspace Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
            flex-grow: 1;
            min-height: 0;
        }
        
        .editor-side, .properties-side {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #output-box { 
            flex-grow: 1; background: #010409; color: var(--accent-green); 
            padding: 15px; border-radius: 8px; border: 1px solid var(--border); 
            overflow: auto; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; 
            font-size: 14px; margin: 0;
        }

        /* Properties Window Styling */
        .properties-window {
            background: #1f242c;
            border: 1px solid var(--border);
            border-radius: 8px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        .prop-header {
            background: #2d333b;
            padding: 8px 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            color: var(--accent-blue);
        }
        .prop-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            border-bottom: 1px solid #22272e;
            align-items: center;
        }
        .prop-name {
            padding: 6px 10px;
            background: #181c22;
            color: #8b949e;
            border-right: 1px solid #22272e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .prop-val {
            padding: 6px 10px;
            color: var(--prop-orange);
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>MRTLC Nexus Engine <small style="color:var(--accent-blue);">v3.0 Production Decompiler</small></h2>
    </div>

    <div class="panel">
        <input type="file" id="file-input" accept=".rbxm,.rbxmx">
        <input type="hidden" id="stripper-toggle"> </div>

    <div class="controls">
        <span style="color:#8b949e">Accuracy State: <strong style="color:var(--accent-green)">94% (Deep Harvester Mode)</strong></span>
        <div class="actions">
            <button id="parse-btn">DECOMPILE MODEL</button>
            <button id="copy-btn">COPY SCRIPT</button>
        </div>
    </div>

    <div class="workspace">
        <div class="editor-side">
            <label style="margin-bottom:5px; font-weight:bold;">Generated Luau Script:</label>
            <pre id="output-box">Upload a Roblox character model file to view decompiled code...</pre>
        </div>

        <div class="properties-side">
            <label style="margin-bottom:5px; font-weight:bold;">Properties Window:</label>
            <div class="properties-window" id="properties-display">
                <div style="padding: 15px; color:#8b949e; text-align:center;">Select or decompile a model file to populate properties.</div>
            </div>
        </div>
    </div>

    <script src="js/parser-dist.js"></script>
</body>
</html>
